<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Planung">
  <title>Planungshelfer — Anmelden</title>
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icon.svg') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main style="max-width:340px;margin:12vh auto">
    <section class="card">
      <div class="brand" style="justify-content:center;margin-bottom:16px">
        <span class="logo">✔️</span><h1>Planungshelfer</h1>
      </div>
      {% if error %}<p class="hint" style="color:#f87171">{{ error }}</p>{% endif %}
      <form method="post" class="addform">
        <input type="password" name="password" placeholder="Passwort" autofocus required>
        <button type="submit" class="add">Anmelden</button>
      </form>
    </section>
  </main>
</body>
</html>
